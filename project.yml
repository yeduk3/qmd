name: qmd
options:
  bundleIdPrefix: com.gyu
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "YES"
    CODE_SIGNING_ALLOWED: "YES"
    DEVELOPMENT_TEAM: ""
    PRODUCT_NAME: "$(TARGET_NAME)"
    ENABLE_HARDENED_RUNTIME: "NO"
targets:
  qmd:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - "Info.plist"
          - "**/*.entitlements"
          - "Resources/web"
      - path: App/Resources/web
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gyu.qmd
        INFOPLIST_FILE: App/Info.plist
        COMBINE_HIDPI_IMAGES: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: QuickLookExtension
        embed: true
  QuickLookExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: QuickLook
        excludes:
          - "Info.plist"
          - "**/*.entitlements"
      - path: App/Shared/WebResources.swift
      - path: App/Resources/web
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gyu.qmd.QuickLookExtension
        PRODUCT_MODULE_NAME: QuickLookExtension
        INFOPLIST_FILE: QuickLook/Info.plist
        CODE_SIGN_ENTITLEMENTS: QuickLook/QuickLook.entitlements
